name: Test Project
on: push

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Run tests
        working-directory: ./WeatherApp
        run: |
          xcodebuild test \
            -project WeatherApp.xcodeproj \
            -scheme WeatherApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
