name: Test Project
on: push
jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Run tests
        working-directory: ./WeatherApp
        run: |
          xcodebuild test \
            -project WeatherApp.xcodeproj \
            -scheme WeatherApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
  build:
    runs-on: macos-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      - name: Build project
        working-directory: ./WeatherApp
        run: |
          xcodebuild build \
            -project WeatherApp.xcodeproj \
            -scheme WeatherApp \
            -destination 'generic/platform=iOS'
